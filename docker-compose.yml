version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: issuetracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: IssueTrackerDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/IssueTracker
      dockerfile: IssueTracker.Api/Dockerfile
    container_name: issuetracker-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080;https://+:8081"
      ASPNETCORE_Kestrel__Certificates__Default__Password: "password"
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/aspnetapp.pfx
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=IssueTrackerDb;Username=postgres;Password=postgres"
    ports:
      - "5000:8080"
      - "5001:8081"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/IssueTracker/IssueTracker.Api/uploads:/app/uploads
      - ~/.aspnet/https:/https:ro

volumes:
  postgres_data:
